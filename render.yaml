services:
  - type: web
    name: kargo-web
    env: node
    plan: free
    buildCommand: "npm ci"
    startCommand: "node index.js"
    envVars:
      - key: API_TOKEN
        value: b7c2d5e1f4a93d74b0c8a2f9e1c3d6a8
      - key: BASE_URL
        value: https://kargo-web.onrender.com

  - type: worker
    name: kargo-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: BOT_TOKEN
        value: <telegram tokenin>
      - key: API_BASE
        value: https://kargo-web.onrender.com
      - key: API_TOKEN
        value: b7c2d5e1f4a93d74b0c8a2f9e1c3d6a8
      - key: ADMIN_USERNAME
        value: CengizzAtay
