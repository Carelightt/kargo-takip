services:
  - type: web
    name: kargo-web
    env: node
    rootDir: server
    plan: free
    buildCommand: "npm ci"
    startCommand: "npm start"
    autoDeploy: true
    healthCheckPath: "/health"
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://kargo-web.onrender.com
      - key: API_TOKEN
        generateValue: true
      - key: DB_FILE
        value: /tmp/db.sqlite   # <— Free planda kalıcı değil, restartta sıfırlanır

  - type: worker
    name: kargo-bot
    env: python
    rootDir: bot
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_TOKEN   # web'deki ile birebir aynı olacak (dashboard'dan kopyala)
        sync: false
      - key: API_BASE
        value: https://kargo-web.onrender.com
      - key: ADMIN_USERNAME
        value: CengizzAtay
